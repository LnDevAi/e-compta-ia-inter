name: comptabia_mobile
description: ComptaBIA — Application mobile analyse financière intelligente
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_riverpod: ^2.5.0
  riverpod_annotation: ^2.3.0
  go_router: ^13.0.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.2.0
  google_fonts: ^6.1.0
  fl_chart: ^0.67.0
  intl: ^0.19.0
  shared_preferences: ^2.2.0
  file_picker: ^8.0.0
  open_file: ^3.3.2
  percent_indicator: ^4.2.3
  path_provider: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
