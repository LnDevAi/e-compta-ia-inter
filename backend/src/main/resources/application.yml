spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecompta}
    username: ${SPRING_DATASOURCE_USERNAME:ecompta}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_change_in_production_must_be_at_least_64_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  base-url: https://api.anthropic.com/v1

logging:
  level:
    com.edefence.ecompta: INFO
    org.springframework.security: WARN
