spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/ecompta}
    username: ${SPRING_DATASOURCE_USERNAME:ecompta}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_SIZE:10}
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}
      password: ${SPRING_DATA_REDIS_PASSWORD:}
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB
  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true
          connectiontimeout: 5000
          timeout: 5000
          writetimeout: 5000

server:
  port: 8080

jwt:
  secret: ${JWT_SECRET:dev_secret_change_in_production_must_be_at_least_64_chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

anthropic:
  api-key: ${ANTHROPIC_API_KEY:}
  model: ${ANTHROPIC_MODEL:claude-haiku-4-5-20251001}
  base-url: https://api.anthropic.com/v1

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: never

springdoc:
  api-docs:
    enabled: true
    path: /v3/api-docs
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    operations-sorter: alpha
    tags-sorter: alpha
    display-request-duration: true
  server-url: ${API_BASE_URL:http://localhost:8080}
  default-produces-media-type: application/json

paiement:
  cinetpay:
    api-key: ${CINETPAY_API_KEY:}
    site-id: ${CINETPAY_SITE_ID:}
    base-url: https://api-checkout.cinetpay.com/v2
    notify-url: ${CINETPAY_NOTIFY_URL:http://localhost:8080/api/public/paiement/cinetpay/notify}
  stripe:
    secret-key: ${STRIPE_SECRET_KEY:}
    webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
    success-url: ${STRIPE_SUCCESS_URL:http://localhost:4200/paiement/succes}
    cancel-url: ${STRIPE_CANCEL_URL:http://localhost:4200/tarifs}
  virement:
    banque: ${VIREMENT_BANQUE:Coris Bank International}
    titulaire: ${VIREMENT_TITULAIRE:eDefence SAS}
    iban: ${VIREMENT_IBAN:BF00 0000 0000 0000 0000 0000 000}
    swift: ${VIREMENT_SWIFT:COBIBFBF}

app:
  licence:
    file: ${LICENCE_FILE:./licence.lic}
    dev-mode: ${LICENCE_DEV_MODE:true}
    public-key: ${LICENCE_PUBLIC_KEY:}
    private-key: ${LICENCE_PRIVATE_KEY:}
  upload:
    dir: ${UPLOAD_DIR:./uploads}
  mail:
    from: ${MAIL_FROM:noreply@ecompta.app}
    enabled: ${MAIL_ENABLED:false}
  sms:
    provider: ${SMS_PROVIDER:mock}
    api-url: ${SMS_API_URL:}
    api-key: ${SMS_API_KEY:}
    sender-id: ${SMS_SENDER_ID:eCompta}
  frontend-url: ${FRONTEND_URL:http://localhost:4200}

logging:
  level:
    com.edefence.ecompta: INFO
    org.springframework.security: WARN
